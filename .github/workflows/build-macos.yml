name: Build (macOS)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        for pkg in cmake pkgconf libtool librtlsdr libusb liquid-dsp openssl@3 catch2; do
          if brew list --versions "$pkg" >/dev/null; then
            echo "$pkg already installed"
          else
            brew install "$pkg"
          fi
        done

    # Fetch the SDRplay API *headers* so the shipped binary is SDRplay-capable.
    # The library is dlopen'd at runtime (never linked/bundled), so this
    # redistributes nothing proprietary and the binary still runs on RTL-only
    # systems. Public vendor download, no auth; pkgutil --expand-full unpacks
    # the .pkg payload without running the installer. Pinned version — bump if
    # it 404s.
    - name: Fetch SDRplay API headers
      run: |
        curl -sSL --retry 3 --max-time 120 -o sdrplay-mac.pkg \
          https://www.sdrplay.com/software/SDRplayAPI-macos-installer-universal-3.15.1.pkg
        pkgutil --expand-full sdrplay-mac.pkg sdrplay_pkg
        echo "SDRPLAY_INC=$(dirname "$(find "$PWD/sdrplay_pkg" -name sdrplay_api.h | head -1)")" >> "$GITHUB_ENV"

    - name: Build (SDRplay-enabled)
      run: |
        export OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
        cmake -S . -B build -DFM_TUNER_ENABLE_SDRPLAY=ON \
          -DSDRPLAY_INCLUDE_DIR="$SDRPLAY_INC" 2>&1 | tee cmake.log
        # Fail loudly rather than silently ship an RTL-only binary.
        grep -q "SDRplay support enabled" cmake.log
        cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Package artifact
      run: |
        mkdir -p dist/macos
        cp build/fm-sdr-tuner dist/macos/
        cp README.md USER-MANUAL.md dist/macos/
        cp fm-sdr-tuner.ini.example fm-sdr-tuner-sdrplay.ini.example dist/macos/
        # Ready-to-use config so auto-load (no -c) works on first run.
        cp fm-sdr-tuner.ini.example dist/macos/fm-sdr-tuner.ini
        cp scripts/rest_test_panel.py scripts/run_rest_panel.sh dist/macos/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-macos
        path: dist/macos
