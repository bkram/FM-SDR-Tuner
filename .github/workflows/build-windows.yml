name: Build (Windows)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-mingw:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2 (MinGW-w64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-rtl-sdr

    - name: Build and install Catch2 (MinGW-w64)
      shell: msys2 {0}
      run: |
        git clone --depth 1 --branch v3.7.1 https://github.com/catchorg/Catch2.git /tmp/Catch2
        cmake -S /tmp/Catch2 -B /tmp/Catch2/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCATCH_BUILD_TESTING=OFF \
          -DCATCH_INSTALL_DOCS=OFF \
          -DCMAKE_INSTALL_PREFIX=/mingw64
        cmake --build /tmp/Catch2/build --parallel
        cmake --install /tmp/Catch2/build

    - name: Build and install liquid-dsp (MinGW-w64)
      shell: msys2 {0}
      run: |
        # Pin to v1.7.0: later master added src/core/src/logging.c which uses
        # timespec_get / TIME_UTC / strsep / "%T" strftime — features MSYS2
        # MinGW-w64 headers do not expose under any feature-test macro. The
        # v1.7.0 tag predates that file and builds cleanly on MinGW-w64.
        git clone --depth 1 --branch v1.7.0 https://github.com/jgaeddert/liquid-dsp.git /tmp/liquid-dsp
        # Two MinGW-w64-specific fixes to v1.7.0's CMakeLists:
        #
        # 1. LIQUID_VERSION derives from scripts/version.sh via execute_process,
        #    which fails silently under MSYS2 and leaves line 380
        #    `set_target_properties(... VERSION ${LIQUID_VERSION} SOVERSION 1)`
        #    malformed. Hard-code the version literal.
        #
        # 2. Line 368 links the shared lib against `-lc` (glibc), which does
        #    not exist under MinGW-w64 (the C runtime is msvcrt/ucrt and is
        #    linked implicitly). Drop `c` from target_link_libraries.
        sed -i 's|VERSION \${LIQUID_VERSION}|VERSION 1.7.0|' /tmp/liquid-dsp/CMakeLists.txt
        sed -i 's|target_link_libraries(\${LIBNAME} c m)|target_link_libraries(\${LIBNAME} m)|' /tmp/liquid-dsp/CMakeLists.txt
        cmake -S /tmp/liquid-dsp -B /tmp/liquid-dsp/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_AUTOTESTS=OFF \
          -DBUILD_BENCHMARKS=OFF \
          -DBUILD_SANDBOX=OFF \
          -DCMAKE_INSTALL_PREFIX=/mingw64
        cmake --build /tmp/liquid-dsp/build --parallel
        cmake --install /tmp/liquid-dsp/build
        # liquid-dsp v1.7.0's install drops `libliquid.dll.a` into
        # ${prefix}/lib/static/ (the upstream default for that version),
        # which is not on MSYS2's default `find_library` search path. Copy
        # it to ${prefix}/lib/ so our root CMakeLists' fallback
        # `find_library(NAMES liquid)` can locate it. The DLL is not staged
        # by upstream install at all, so copy it from the build dir into
        # ${prefix}/bin/ for runtime load during smoke tests.
        cp /mingw64/lib/static/libliquid.dll.a /mingw64/lib/libliquid.dll.a
        cp /tmp/liquid-dsp/build/libliquid.dll /mingw64/bin/libliquid.dll

    - name: Build (MinGW-w64)
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DFM_TUNER_ENABLE_X86_AVX2=OFF
        cmake --build build --parallel

    - name: Smoke test CLI (MinGW-w64)
      shell: msys2 {0}
      run: |
        ./build/fm-sdr-tuner.exe --help

    - name: Run tests (MinGW-w64)
      shell: msys2 {0}
      run: |
        ctest --test-dir build --output-on-failure --no-tests=error

    - name: Bundle runtime dependencies (MinGW-w64)
      shell: msys2 {0}
      run: |
        mkdir -p dist/windows-mingw
        cp build/fm-sdr-tuner.exe dist/windows-mingw/
        cp README.md dist/windows-mingw/
        cp fm-sdr-tuner.ini.example dist/windows-mingw/
        cp scripts/rest_test_panel.py dist/windows-mingw/

        mapfile -t deps < <(
          ldd build/fm-sdr-tuner.exe \
            | awk 'tolower($0) ~ /=> \/mingw64\/bin\/.*\.dll/ {print $3}' \
            | sort -u
        )

        {
          echo "Required MinGW DLL dependencies for build/fm-sdr-tuner.exe:"
          ldd build/fm-sdr-tuner.exe
          echo
          echo "Copied DLL files:"
        } > dist/windows-mingw/dependencies.txt

        for dep in "${deps[@]}"; do
          if [ -f "$dep" ]; then
            cp "$dep" dist/windows-mingw/
            echo "$(basename "$dep") <- $dep" >> dist/windows-mingw/dependencies.txt
          fi
        done

        {
          echo
          echo "Packaged directory contents:"
          ls -1 dist/windows-mingw
        } >> dist/windows-mingw/dependencies.txt

        cat dist/windows-mingw/dependencies.txt

    - name: Smoke test packaged artifact (MinGW-w64)
      shell: msys2 {0}
      run: |
        cd dist/windows-mingw
        ./fm-sdr-tuner.exe --help
        if ldd ./fm-sdr-tuner.exe | grep -qi "not found"; then
          echo "ERROR: Packaged executable has missing shared library dependencies"
          ldd ./fm-sdr-tuner.exe
          exit 1
        fi

    - name: Upload artifact (MinGW-w64)
      uses: actions/upload-artifact@v4
      with:
        name: fm-sdr-tuner-windows-mingw
        path: dist/windows-mingw
