name: Build (Linux)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage-ubuntu-24-04:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        if command -v sudo >/dev/null 2>&1; then SUDO="sudo"; else SUDO=""; fi
        $SUDO apt-get update
        $SUDO apt-get install -y cmake g++ pkg-config librtlsdr-dev libusb-1.0-0-dev libssl-dev libasound2-dev libliquid-dev catch2 gcovr

    - name: Build with coverage
      run: |
        cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DFM_TUNER_ENABLE_X86_AVX2=OFF -DFM_TUNER_ENABLE_COVERAGE=ON
        cmake --build build-coverage -j$(nproc)

    - name: Run tests
      run: |
        ctest --test-dir build-coverage --output-on-failure --no-tests=error

    - name: Generate coverage report
      run: |
        gcovr --root . build-coverage \
          --exclude 'build-coverage/.*' \
          --exclude 'tests/.*' \
          --exclude 'src/redsea_port/.*' \
          --txt --txt-summary \
          --xml-pretty --xml build-coverage/coverage.xml \
          --html-details build-coverage/coverage.html

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-coverage-ubuntu-24.04
        path: |
          build-coverage/coverage.xml
          build-coverage/coverage.html

  build-ubuntu-24-04:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        if command -v sudo >/dev/null 2>&1; then SUDO="sudo"; else SUDO=""; fi
        $SUDO apt-get update
        $SUDO apt-get install -y cmake g++ file dpkg-dev pkg-config librtlsdr-dev libusb-1.0-0-dev libssl-dev libasound2-dev libliquid-dev catch2 curl ca-certificates

    # Fetch the SDRplay API *headers* so the shipped binary is SDRplay-capable.
    # The library is dlopen'd at runtime (never linked/bundled), so this
    # redistributes nothing proprietary, adds no package dependency, and the
    # binary still runs on RTL-only systems. makeself --noexec extracts the
    # payload (incl. inc/sdrplay_api.h, arch-independent) without running the
    # installer. Pinned version — bump if it 404s.
    - name: Build (SDRplay-enabled)
      run: |
        curl -sSL --retry 3 --max-time 120 -o sdrplay.run \
          https://www.sdrplay.com/software/SDRplay_RSP_API-Linux-3.15.2.run
        sh sdrplay.run --noexec --target sdrplay_pkg
        test -f sdrplay_pkg/inc/sdrplay_api.h
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFM_TUNER_ENABLE_X86_AVX2=OFF \
          -DFM_TUNER_ENABLE_SDRPLAY=ON -DSDRPLAY_INCLUDE_DIR="$PWD/sdrplay_pkg/inc" 2>&1 | tee cmake.log
        # Fail loudly rather than silently ship an RTL-only binary.
        grep -q "SDRplay support enabled" cmake.log
        cmake --build build -j$(nproc)

    - name: Run tests
      run: |
        ctest --test-dir build --output-on-failure --no-tests=error

    - name: Build Debian package
      run: |
        cd build
        cpack -G DEB
        mkdir -p ../dist/linux
        cp ./*.deb ../dist/linux/
        cp ../README.md ../USER-MANUAL.md ../dist/linux/
        cp ../fm-sdr-tuner.ini.example ../fm-sdr-tuner-sdrplay.ini.example ../dist/linux/
        # Ready-to-use config so auto-load (no -c) works on first run.
        cp ../fm-sdr-tuner.ini.example ../dist/linux/fm-sdr-tuner.ini
        cp ../scripts/rest_test_panel.py ../scripts/run_rest_panel.sh ../dist/linux/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-linux-deb-ubuntu-24.04-${{ matrix.arch }}
        path: dist/linux

  build-debian-trixie:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    container: debian:trixie

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        if command -v sudo >/dev/null 2>&1; then SUDO="sudo"; else SUDO=""; fi
        $SUDO apt-get update
        $SUDO apt-get install -y cmake g++ file dpkg-dev pkg-config librtlsdr-dev libusb-1.0-0-dev libssl-dev libasound2-dev libliquid-dev catch2 curl ca-certificates

    # Fetch the SDRplay API *headers* so the shipped binary is SDRplay-capable.
    # The library is dlopen'd at runtime (never linked/bundled), so this
    # redistributes nothing proprietary, adds no package dependency, and the
    # binary still runs on RTL-only systems. makeself --noexec extracts the
    # payload (incl. inc/sdrplay_api.h, arch-independent) without running the
    # installer. Pinned version — bump if it 404s.
    - name: Build (SDRplay-enabled)
      run: |
        curl -sSL --retry 3 --max-time 120 -o sdrplay.run \
          https://www.sdrplay.com/software/SDRplay_RSP_API-Linux-3.15.2.run
        sh sdrplay.run --noexec --target sdrplay_pkg
        test -f sdrplay_pkg/inc/sdrplay_api.h
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFM_TUNER_ENABLE_X86_AVX2=OFF \
          -DFM_TUNER_ENABLE_SDRPLAY=ON -DSDRPLAY_INCLUDE_DIR="$PWD/sdrplay_pkg/inc" 2>&1 | tee cmake.log
        # Fail loudly rather than silently ship an RTL-only binary.
        grep -q "SDRplay support enabled" cmake.log
        cmake --build build -j$(nproc)

    - name: Run tests
      run: |
        ctest --test-dir build --output-on-failure --no-tests=error

    - name: Build Debian package
      run: |
        cd build
        cpack -G DEB
        mkdir -p ../dist/linux
        cp ./*.deb ../dist/linux/
        cp ../README.md ../USER-MANUAL.md ../dist/linux/
        cp ../fm-sdr-tuner.ini.example ../fm-sdr-tuner-sdrplay.ini.example ../dist/linux/
        # Ready-to-use config so auto-load (no -c) works on first run.
        cp ../fm-sdr-tuner.ini.example ../dist/linux/fm-sdr-tuner.ini
        cp ../scripts/rest_test_panel.py ../scripts/run_rest_panel.sh ../dist/linux/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-linux-deb-debian-trixie-${{ matrix.arch }}
        path: dist/linux

  build-fedora-42:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    container: fedora:42

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        dnf install -y cmake gcc-c++ make file pkgconfig tar gzip
        dnf install -y openssl-devel alsa-lib-devel
        dnf install -y rtl-sdr-devel liquid-dsp-devel
        dnf install -y catch2-devel
        dnf install -y rpm-build || true

    # Fetch the SDRplay API *headers* so the shipped binary is SDRplay-capable.
    # The library is dlopen'd at runtime (never linked/bundled), so this
    # redistributes nothing proprietary, adds no package dependency, and the
    # binary still runs on RTL-only systems. makeself --noexec extracts the
    # payload (incl. inc/sdrplay_api.h, arch-independent) without running the
    # installer. Pinned version — bump if it 404s.
    - name: Build (SDRplay-enabled)
      run: |
        curl -sSL --retry 3 --max-time 120 -o sdrplay.run \
          https://www.sdrplay.com/software/SDRplay_RSP_API-Linux-3.15.2.run
        sh sdrplay.run --noexec --target sdrplay_pkg
        test -f sdrplay_pkg/inc/sdrplay_api.h
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFM_TUNER_ENABLE_X86_AVX2=OFF \
          -DFM_TUNER_ENABLE_SDRPLAY=ON -DSDRPLAY_INCLUDE_DIR="$PWD/sdrplay_pkg/inc" 2>&1 | tee cmake.log
        # Fail loudly rather than silently ship an RTL-only binary.
        grep -q "SDRplay support enabled" cmake.log
        cmake --build build -j$(nproc)

    - name: Run tests
      run: |
        ctest --test-dir build --output-on-failure --no-tests=error

    - name: Create RPM package
      run: |
        cd build
        cpack -G RPM
        mkdir -p ../dist/linux
        cp ./*.rpm ../dist/linux/
        cp ../README.md ../USER-MANUAL.md ../dist/linux/
        cp ../fm-sdr-tuner.ini.example ../fm-sdr-tuner-sdrplay.ini.example ../dist/linux/
        # Ready-to-use config so auto-load (no -c) works on first run.
        cp ../fm-sdr-tuner.ini.example ../dist/linux/fm-sdr-tuner.ini
        cp ../scripts/rest_test_panel.py ../scripts/run_rest_panel.sh ../dist/linux/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-linux-rpm-fedora-42-${{ matrix.arch }}
        path: dist/linux

  build-fedora-43:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    container: fedora:43

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        dnf install -y cmake gcc-c++ make file pkgconfig tar gzip
        dnf install -y openssl-devel alsa-lib-devel
        dnf install -y rtl-sdr-devel liquid-dsp-devel
        dnf install -y catch2-devel
        dnf install -y rpm-build || true

    # Fetch the SDRplay API *headers* so the shipped binary is SDRplay-capable.
    # The library is dlopen'd at runtime (never linked/bundled), so this
    # redistributes nothing proprietary, adds no package dependency, and the
    # binary still runs on RTL-only systems. makeself --noexec extracts the
    # payload (incl. inc/sdrplay_api.h, arch-independent) without running the
    # installer. Pinned version — bump if it 404s.
    - name: Build (SDRplay-enabled)
      run: |
        curl -sSL --retry 3 --max-time 120 -o sdrplay.run \
          https://www.sdrplay.com/software/SDRplay_RSP_API-Linux-3.15.2.run
        sh sdrplay.run --noexec --target sdrplay_pkg
        test -f sdrplay_pkg/inc/sdrplay_api.h
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DFM_TUNER_ENABLE_X86_AVX2=OFF \
          -DFM_TUNER_ENABLE_SDRPLAY=ON -DSDRPLAY_INCLUDE_DIR="$PWD/sdrplay_pkg/inc" 2>&1 | tee cmake.log
        # Fail loudly rather than silently ship an RTL-only binary.
        grep -q "SDRplay support enabled" cmake.log
        cmake --build build -j$(nproc)

    - name: Run tests
      run: |
        ctest --test-dir build --output-on-failure --no-tests=error

    - name: Create RPM package
      run: |
        cd build
        cpack -G RPM
        mkdir -p ../dist/linux
        cp ./*.rpm ../dist/linux/
        cp ../README.md ../USER-MANUAL.md ../dist/linux/
        cp ../fm-sdr-tuner.ini.example ../fm-sdr-tuner-sdrplay.ini.example ../dist/linux/
        # Ready-to-use config so auto-load (no -c) works on first run.
        cp ../fm-sdr-tuner.ini.example ../dist/linux/fm-sdr-tuner.ini
        cp ../scripts/rest_test_panel.py ../scripts/run_rest_panel.sh ../dist/linux/

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: fm-sdr-tuner-linux-rpm-fedora-43-${{ matrix.arch }}
        path: dist/linux

  smoke-test-deb-install:
    needs:
      - build-ubuntu-24-04
      - build-debian-trixie
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
    - name: Download Ubuntu package artifact
      uses: actions/download-artifact@v8
      with:
        name: fm-sdr-tuner-linux-deb-ubuntu-24.04-${{ matrix.arch }}
        path: /tmp/artifacts/ubuntu

    - name: Download Debian package artifact
      uses: actions/download-artifact@v8
      with:
        name: fm-sdr-tuner-linux-deb-debian-trixie-${{ matrix.arch }}
        path: /tmp/artifacts/debian

    - name: Smoke test package install in fresh containers
      run: |
        set -euxo pipefail
        test_pkg_in_container() {
          image="$1"
          pkg_dir="$2"
          docker pull "$image"
          docker run --rm -v "$pkg_dir:/pkg:ro" "$image" sh -euxc '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y ca-certificates
            apt-get install -y /pkg/*.deb
            ldd /usr/bin/fm-sdr-tuner | tee /tmp/ldd.txt
            if grep -q "not found" /tmp/ldd.txt; then
              echo "Missing shared libraries detected"
              exit 1
            fi
            /usr/bin/fm-sdr-tuner --help >/tmp/help.txt 2>&1 || true
            grep -q "Usage:" /tmp/help.txt
          '
        }

        test_pkg_in_container ubuntu:24.04 /tmp/artifacts/ubuntu
        test_pkg_in_container debian:trixie /tmp/artifacts/debian

  smoke-test-rpm-install:
    needs:
      - build-fedora-42
      - build-fedora-43
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
    - name: Download Fedora 42 package artifact
      uses: actions/download-artifact@v8
      with:
        name: fm-sdr-tuner-linux-rpm-fedora-42-${{ matrix.arch }}
        path: /tmp/artifacts/fedora-42

    - name: Download Fedora 43 package artifact
      uses: actions/download-artifact@v8
      with:
        name: fm-sdr-tuner-linux-rpm-fedora-43-${{ matrix.arch }}
        path: /tmp/artifacts/fedora-43

    - name: Smoke test RPM install in fresh containers
      run: |
        set -euxo pipefail
        test_rpm_in_container() {
          image="$1"
          pkg_dir="$2"
          docker pull "$image"
          docker run --rm -v "$pkg_dir:/pkg:ro" "$image" sh -euxc '
            dnf install -y /pkg/*.rpm
            ldd /usr/bin/fm-sdr-tuner | tee /tmp/ldd.txt
            if grep -q "not found" /tmp/ldd.txt; then
              echo "Missing shared libraries detected"
              exit 1
            fi
            /usr/bin/fm-sdr-tuner --help >/tmp/help.txt 2>&1 || true
            grep -q "Usage:" /tmp/help.txt
          '
        }

        test_rpm_in_container fedora:42 /tmp/artifacts/fedora-42
        test_rpm_in_container fedora:43 /tmp/artifacts/fedora-43
